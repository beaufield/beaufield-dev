<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>経費事前申請</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a73e8;
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 18px; font-weight: bold; }
    header .version { font-size: 11px; opacity: 0.7; margin-left: auto; }

    main {
      flex: 1;
      max-width: 600px;
      width: 100%;
      margin: 24px auto;
      padding: 0 16px;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }

    .field { margin-bottom: 20px; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: bold;
      color: #555;
      margin-bottom: 6px;
    }
    .field label .required {
      color: #e53935;
      margin-left: 4px;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 15px;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      outline: none;
      border-color: #1a73e8;
    }
    .field input[readonly] {
      background: #f8f8f8;
      color: #666;
    }
    .field textarea { resize: vertical; min-height: 80px; }

    .field .hint {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn-submit:hover { background: #1558b0; }
    .btn-submit:disabled { background: #aaa; cursor: not-allowed; }

    /* 完了画面 */
    #success-view { display: none; text-align: center; padding: 32px 16px; }
    #success-view .icon { font-size: 56px; margin-bottom: 16px; }
    #success-view h2 { font-size: 20px; margin-bottom: 8px; color: #1a73e8; }
    #success-view p { color: #666; font-size: 14px; line-height: 1.6; }
    .btn-back {
      display: inline-block;
      margin-top: 24px;
      padding: 10px 24px;
      background: #f0f0f0;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      color: #333;
    }
    .btn-back:hover { background: #e0e0e0; }

    /* エラー表示 */
    #error-msg {
      display: none;
      background: #fdecea;
      border: 1px solid #f5c6cb;
      color: #c62828;
      padding: 12px 14px;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 16px;
    }

    footer {
      text-align: center;
      padding: 16px;
      font-size: 11px;
      color: #aaa;
    }
  </style>
</head>
<body>

<header>
  <h1>💰 経費事前申請</h1>
  <span class="version">v1.0.0</span>
</header>

<main>
  <!-- 申請フォーム -->
  <div id="form-view" class="card">
    <div id="error-msg"></div>

    <div class="field">
      <label>申請者名</label>
      <input type="text" id="applicant-name" readonly>
    </div>

    <div class="field">
      <label>経費種別 <span class="required">*</span></label>
      <select id="expense-type">
        <option value="">選択してください</option>
        <option value="交通費">交通費</option>
        <option value="接待費">接待費</option>
        <option value="消耗品">消耗品</option>
        <option value="その他">その他</option>
      </select>
    </div>

    <div class="field">
      <label>使用目的 <span class="required">*</span></label>
      <textarea id="purpose" placeholder="例：〇〇訪問のための交通費"></textarea>
    </div>

    <div class="field">
      <label>使用予定日 <span class="required">*</span></label>
      <input type="date" id="use-date">
    </div>

    <div class="field">
      <label>予定金額（円） <span class="required">*</span></label>
      <input type="number" id="amount" placeholder="例：3000" min="1">
      <div class="hint">税込金額を入力してください</div>
    </div>

    <button class="btn-submit" id="btn-submit" onclick="submitForm()">申請する</button>
  </div>

  <!-- 完了画面 -->
  <div id="success-view" class="card">
    <div class="icon">✅</div>
    <h2>申請が完了しました</h2>
    <p>承認者に通知を送りました。<br>結果は LINE WORKS でお知らせします。</p>
    <button class="btn-back" onclick="resetForm()">もう一度申請する</button>
  </div>
</main>

<footer>経費事前申請 v1.0.0 | Beaufield</footer>

<script>
  // ===== 設定 =====
  // GAS デプロイ後に発行された Web アプリ URL を貼り付けてください
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbyi1oZ3MLdVflBnjkwzwTC9edeRRQM3TTqcw5zkMzpDZp9e5F1TwMH9ApyK_iuJDC1DDQ/exec';
  const PORTAL_URL = 'https://beaufield.github.io/beaufield-dev/';

  // ===== 初期化 =====
  let session = null;

  window.onload = function () {
    // bf_session チェック
    try {
      session = JSON.parse(localStorage.getItem('bf_session'));
    } catch (e) {
      session = null;
    }

    if (!session || !session.user_id || new Date(session.expires) < new Date()) {
      location.href = PORTAL_URL;
      return;
    }

    // 申請者名を自動セット
    document.getElementById('applicant-name').value = session.name || '';

    // 使用予定日のデフォルトを明日に設定
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    document.getElementById('use-date').value = tomorrow.toISOString().split('T')[0];
  };

  // ===== フォーム送信 =====
  function submitForm() {
    const expenseType = document.getElementById('expense-type').value;
    const purpose     = document.getElementById('purpose').value.trim();
    const useDate     = document.getElementById('use-date').value;
    const amount      = document.getElementById('amount').value;

    // バリデーション
    if (!expenseType) { showError('経費種別を選択してください。'); return; }
    if (!purpose)     { showError('使用目的を入力してください。'); return; }
    if (!useDate)     { showError('使用予定日を入力してください。'); return; }
    if (!amount || Number(amount) <= 0) { showError('予定金額を正しく入力してください。'); return; }

    hideError();
    const btn = document.getElementById('btn-submit');
    btn.disabled = true;
    btn.textContent = '送信中...';

    const payload = {
      user_id     : session.user_id,
      name        : session.name,
      expense_type: expenseType,
      purpose     : purpose,
      use_date    : useDate,
      amount      : Number(amount)
    };

    fetch(GAS_URL + '?type=form', {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(data => {
      if (data.ok) {
        document.getElementById('form-view').style.display = 'none';
        document.getElementById('success-view').style.display = 'block';
      } else {
        showError('エラーが発生しました: ' + (data.error || '不明なエラー'));
        btn.disabled = false;
        btn.textContent = '申請する';
      }
    })
    .catch(err => {
      showError('通信エラーが発生しました。時間をおいて再度お試しください。');
      btn.disabled = false;
      btn.textContent = '申請する';
    });
  }

  function resetForm() {
    document.getElementById('expense-type').value = '';
    document.getElementById('purpose').value = '';
    document.getElementById('amount').value = '';
    document.getElementById('btn-submit').disabled = false;
    document.getElementById('btn-submit').textContent = '申請する';
    hideError();
    document.getElementById('success-view').style.display = 'none';
    document.getElementById('form-view').style.display = 'block';
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
    window.scrollTo(0, 0);
  }

  function hideError() {
    document.getElementById('error-msg').style.display = 'none';
  }
</script>

</body>
</html>

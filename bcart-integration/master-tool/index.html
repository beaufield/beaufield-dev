<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BCARTマスター管理ツール</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 14px; background: #f5f6fa; color: #333; }

.header { background: #1a56db; color: #fff; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 16px; font-weight: 700; }
.header .version { font-size: 11px; opacity: 0.7; }

.tabs { display: flex; background: #fff; border-bottom: 2px solid #e5e7eb; padding: 0 20px; }
.tab { padding: 12px 20px; cursor: pointer; font-size: 14px; border-bottom: 3px solid transparent; margin-bottom: -2px; color: #6b7280; }
.tab.active { color: #1a56db; border-bottom-color: #1a56db; font-weight: 600; }
.tab:hover:not(.active) { color: #374151; }

.content { padding: 20px; max-width: 1200px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

.badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
.badge-price { background: #fef3c7; color: #d97706; }
.badge-disc { background: #fee2e2; color: #dc2626; }
.badge-unreg { background: #ede9fe; color: #7c3aed; }
.badge-ignore { background: #f3f4f6; color: #9ca3af; }
.badge-wip { background: #dbeafe; color: #1d4ed8; }

.btn { display: inline-flex; align-items: center; gap: 4px; padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; transition: opacity 0.15s; }
.btn:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: #1a56db; color: #fff; }
.btn-success { background: #059669; color: #fff; }
.btn-danger { background: #dc2626; color: #fff; }
.btn-gray { background: #e5e7eb; color: #374151; }
.btn-sm { padding: 4px 10px; font-size: 12px; }

.summary-bar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.summary-item { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px 16px; min-width: 140px; }
.summary-item .label { font-size: 11px; color: #6b7280; margin-bottom: 2px; }
.summary-item .value { font-size: 22px; font-weight: 700; }
.value-price { color: #d97706; }
.value-disc { color: #dc2626; }
.value-unreg { color: #7c3aed; }

.filter-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
.filter-btn { padding: 5px 12px; border: 1px solid #e5e7eb; border-radius: 20px; background: #fff; cursor: pointer; font-size: 13px; color: #6b7280; }
.filter-btn.active { border-color: #1a56db; background: #eff6ff; color: #1a56db; font-weight: 600; }

.diff-item { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 8px; }
.diff-item.ignored { opacity: 0.5; }
.diff-header { padding: 10px 14px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.diff-code { font-family: monospace; font-size: 12px; color: #6b7280; }
.diff-name { font-weight: 600; flex: 1; }
.diff-supplier { font-size: 12px; color: #9ca3af; }
.diff-actions { display: flex; gap: 6px; align-items: center; padding: 8px 14px; background: #f9fafb; border-top: 1px solid #f3f4f6; border-radius: 0 0 8px 8px; flex-wrap: wrap; }
.diff-detail { padding: 6px 14px; border-top: 1px solid #f3f4f6; font-size: 13px; }
.diff-detail .row { display: flex; gap: 16px; align-items: center; padding: 3px 0; }
.diff-detail .lbl { color: #6b7280; min-width: 80px; }
.diff-detail .old { color: #9ca3af; text-decoration: line-through; }
.diff-detail .new { color: #059669; font-weight: 600; }

.bcart-ids { font-size: 11px; color: #9ca3af; display: flex; gap: 14px; width: 100%; margin-top: 3px; }
.bcart-ids a { color: #1a56db; text-decoration: none; }
.bcart-ids a:hover { text-decoration: underline; }

.bulk-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }

.stock-search { display: flex; gap: 8px; margin-bottom: 16px; }
.stock-search input { flex: 1; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; }
.stock-result { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 14px; margin-bottom: 8px; }

.ignore-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 6px; }
.ignore-item .info { flex: 1; }
.ignore-item .reason { font-size: 12px; color: #6b7280; margin-top: 2px; }

/* 進捗オーバーレイ */
#progressOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
#progressOverlay.open { display: flex; }
.progress-card { background: #fff; border-radius: 12px; padding: 32px 40px; width: 400px; text-align: center; }
.progress-card h3 { font-size: 16px; margin-bottom: 8px; }
.progress-count { font-size: 36px; font-weight: 700; color: #1a56db; margin: 12px 0; }
.progress-bar-wrap { background: #e5e7eb; border-radius: 8px; height: 10px; margin-bottom: 12px; overflow: hidden; }
.progress-bar-fill { background: #1a56db; height: 10px; border-radius: 8px; width: 0%; transition: width 0.25s; }
.progress-detail { font-size: 12px; color: #9ca3af; min-height: 18px; }
.progress-result { margin-top: 16px; font-size: 13px; }

/* 履歴テーブル */
.history-table { width: 100%; border-collapse: collapse; font-size: 13px; background: #fff; border-radius: 8px; overflow: hidden; border: 1px solid #e5e7eb; }
.history-table th { background: #f9fafb; padding: 9px 12px; text-align: left; font-weight: 600; border-bottom: 2px solid #e5e7eb; white-space: nowrap; }
.history-table td { padding: 8px 12px; border-bottom: 1px solid #f3f4f6; vertical-align: top; }
.history-table tr:last-child td { border-bottom: none; }
.history-table tr:hover td { background: #f9fafb; }
.result-ok { color: #059669; font-weight: 600; }
.result-ng { color: #dc2626; font-size: 11px; }

#toast { position: fixed; bottom: 20px; right: 20px; background: #1f2937; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; display: none; z-index: 1000; }
#toast.error { background: #dc2626; }

.loading { text-align: center; padding: 40px; color: #9ca3af; }
.spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #e5e7eb; border-top-color: #1a56db; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: #fff; border-radius: 10px; padding: 24px; width: 380px; max-width: 90vw; }
.modal h3 { font-size: 16px; margin-bottom: 12px; }
.modal textarea { width: 100%; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; margin-bottom: 12px; min-height: 80px; resize: vertical; }
.modal .actions { display: flex; gap: 8px; justify-content: flex-end; }

.warn-bar { background: #fef3c7; border: 1px solid #fcd34d; border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; font-size: 13px; color: #92400e; }

#loginScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-card { background: #fff; border-radius: 12px; padding: 32px; width: 340px; text-align: center; border: 1px solid #e5e7eb; }
.login-card h2 { font-size: 18px; margin-bottom: 4px; }
.login-card p { color: #6b7280; font-size: 13px; margin-bottom: 20px; }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <h2>BCARTマスター管理</h2>
    <p>ポータルからログインしてください</p>
    <button class="btn btn-primary" onclick="goToPortal()" style="width:100%">ポータルへ移動</button>
    <div style="margin-top:12px;font-size:12px;color:#9ca3af;">HTML v1.1.0</div>
  </div>
</div>

<div id="mainScreen" style="display:none;">
  <div class="header">
    <h1>BCARTマスター管理ツール</h1>
    <span class="version">HTML v1.1.0</span>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('diff',this)">差異一覧</div>
    <div class="tab" onclick="switchTab('ignore',this)">対応不要</div>
    <div class="tab" onclick="switchTab('stock',this)">欠品設定</div>
    <div class="tab" onclick="switchTab('history',this)">📋 更新履歴</div>
  </div>

  <div class="content">

    <!-- タブ1: 差異一覧 -->
    <div class="tab-panel active" id="tab-diff">
      <div id="csvWarn" class="warn-bar" style="display:none;"></div>

      <div class="summary-bar">
        <div class="summary-item"><div class="label">💰 価格差異</div><div class="value value-price" id="cnt-price">-</div></div>
        <div class="summary-item"><div class="label">🚫 廃番未処理</div><div class="value value-disc" id="cnt-disc">-</div></div>
        <div class="summary-item"><div class="label">❌ 未登録</div><div class="value value-unreg" id="cnt-unreg">-</div></div>
        <div class="summary-item"><div class="label">📋 対応不要</div><div class="value" id="cnt-ignore">-</div></div>
      </div>

      <div class="filter-bar">
        <span style="font-size:13px;color:#6b7280;">絞り込み:</span>
        <button class="filter-btn type-filter-btn active" onclick="setFilter('all',this)">すべて</button>
        <button class="filter-btn type-filter-btn" onclick="setFilter('price',this)">💰 価格差異</button>
        <button class="filter-btn type-filter-btn" onclick="setFilter('discontinued',this)">🚫 廃番</button>
        <button class="filter-btn type-filter-btn" onclick="setFilter('unregistered',this)">❌ 未登録</button>
        <button class="filter-btn type-filter-btn" onclick="setFilter('ignored',this)">対応不要も表示</button>
        <button class="btn btn-primary btn-sm" style="margin-left:auto;" onclick="loadData()">🔄 再読み込み</button>
        <button class="btn btn-gray btn-sm" onclick="runDebug()">🔍 デバッグ</button>
      </div>
      <div class="filter-bar" id="supplierFilterBar" style="display:none;">
        <span style="font-size:13px;color:#6b7280;white-space:nowrap;">仕入先:</span>
        <select id="supplierSelect" onchange="setSupplierFilter(this.value)" style="padding:5px 10px;border:1px solid #e5e7eb;border-radius:6px;font-size:13px;background:#fff;flex:1;max-width:300px;">
          <option value="">すべて</option>
        </select>
      </div>

      <div class="bulk-bar">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
          <input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)"> すべて選択
        </label>
        <button class="btn btn-success btn-sm" id="bulkBtn" onclick="bulkUpdate()" disabled>✅ 選択項目を一括更新</button>
      </div>

      <div id="diffList">
        <div class="loading"><div class="spinner"></div><div>データを読み込み中...</div></div>
      </div>
    </div>

    <!-- タブ2: 対応不要一覧 -->
    <div class="tab-panel" id="tab-ignore">
      <div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
        <button class="btn btn-gray btn-sm" onclick="loadIgnoreList()">🔄 更新</button>
      </div>
      <div id="ignoreList">
        <div class="loading"><div class="spinner"></div><div>読み込み中...</div></div>
      </div>
    </div>

    <!-- タブ3: 欠品設定 -->
    <div class="tab-panel" id="tab-stock">
      <div style="background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:16px;">
        <p style="margin-bottom:12px;color:#6b7280;font-size:13px;">商品コードまたは商品名で検索し、在庫0（欠品）または1（復活）を設定します。</p>
        <div class="stock-search">
          <input type="text" id="stockQuery" placeholder="商品コードまたは商品名" onkeydown="if(event.key==='Enter')searchStock()">
          <button class="btn btn-primary" onclick="searchStock()">検索</button>
        </div>
        <div id="stockResult"></div>
      </div>
    </div>

    <!-- タブ4: 更新履歴 -->
    <div class="tab-panel" id="tab-history">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <span style="font-size:13px;color:#6b7280;">BCARTへの変更操作履歴（最新200件）</span>
        <button class="btn btn-gray btn-sm" onclick="loadHistory()">🔄 更新</button>
      </div>
      <div id="historyList">
        <div class="loading"><div class="spinner"></div><div>読み込み中...</div></div>
      </div>
    </div>

  </div>
</div>

<!-- 対応不要モーダル -->
<div class="modal-overlay" id="ignoreModal">
  <div class="modal">
    <h3>対応不要にする</h3>
    <div style="margin-bottom:8px;font-size:13px;">
      <strong id="ignoreModalCode"></strong> <span id="ignoreModalName" style="color:#6b7280;"></span>
    </div>
    <textarea id="ignoreReason" placeholder="理由を入力（任意）"></textarea>
    <div class="actions">
      <button class="btn btn-gray" onclick="closeModal('ignoreModal')">キャンセル</button>
      <button class="btn btn-primary" onclick="confirmIgnore()">対応不要にする</button>
    </div>
  </div>
</div>

<!-- 進捗オーバーレイ -->
<div id="progressOverlay">
  <div class="progress-card">
    <h3>BCARTに反映中...</h3>
    <div class="progress-count" id="progressCount">0 / 0</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBarFill"></div>
    </div>
    <div class="progress-detail" id="progressDetail"></div>
    <div class="progress-result" id="progressResult"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ===================== 設定 =====================
const PORTAL_URL = 'https://beaufield.github.io/beaufield-dev/';
const GAS_URL = 'https://script.google.com/macros/s/AKfycbybKTVZGHChqJTUE11DS3WVzXtZcR0rusCfXIiLabtJ8HWwo1pmB18rTNbiE2w0cpRB/exec';
const BCART_ADMIN_BASE = 'https://beaufieldec.i16.bcart.jp/admin/products';

// ===================== 状態 =====================
let session = null;
let allDiffs = [];
let currentFilter = 'all';
let currentSupplier = '';
let pendingIgnoreCode = null;
let pendingIgnoreName = null;

// ===================== 初期化 =====================
window.onload = function() {
  const raw = localStorage.getItem('bf_session');
  if (!raw) { goToPortal(); return; }
  try {
    session = JSON.parse(raw);
    if (!session.token || Date.now() > session.expires) { goToPortal(); return; }
  } catch(e) { goToPortal(); return; }

  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainScreen').style.display = 'block';
  loadData();
};

function goToPortal() {
  window.location.href = PORTAL_URL;
}

// ===================== タブ切り替え =====================
function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  if (el) el.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'ignore') loadIgnoreList();
  if (tab === 'history') loadHistory();
}

// ===================== データ読み込み =====================
function loadData() {
  document.getElementById('diffList').innerHTML = '<div class="loading"><div class="spinner"></div><div>データを読み込み中...</div></div>';
  ['cnt-price','cnt-disc','cnt-unreg','cnt-ignore'].forEach(id => document.getElementById(id).textContent = '-');

  gasPost({ action: 'loadData' }, function(res) {
    if (!res.ok) { showToast('データ読み込みエラー: ' + res.error, true); return; }

    allDiffs = res.diffs || [];

    const warnEl = document.getElementById('csvWarn');
    if (res.isOld) {
      warnEl.style.display = 'block';
      warnEl.textContent = '⚠️ 商品.CSV の更新日時が古い可能性があります（最終更新: ' + res.csvUpdatedAt + '）';
    } else {
      warnEl.style.display = 'none';
    }

    updateSummary();
    renderDiffs();
  });
}

function updateSummary() {
  const active = allDiffs.filter(d => !d.isIgnored);
  document.getElementById('cnt-price').textContent = active.filter(d => d.issues && d.issues.some(i => i.type === 'price')).length;
  document.getElementById('cnt-disc').textContent = active.filter(d => d.issues && d.issues.some(i => i.type === 'discontinued')).length;
  document.getElementById('cnt-unreg').textContent = active.filter(d => d.type === 'unregistered').length;
  document.getElementById('cnt-ignore').textContent = allDiffs.filter(d => d.isIgnored).length;
}

// ===================== フィルター =====================
function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.type-filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderDiffs();
}

function setSupplierFilter(supplier) {
  currentSupplier = supplier;
  renderDiffs();
}

function buildSupplierFilter() {
  const bar = document.getElementById('supplierFilterBar');
  const sel = document.getElementById('supplierSelect');
  const suppliers = [...new Set(allDiffs.map(d => d.supplier).filter(s => s))].sort();
  if (suppliers.length === 0) { bar.style.display = 'none'; return; }

  bar.style.display = 'flex';
  const current = sel.value;
  sel.innerHTML = '<option value="">すべて</option>' +
    suppliers.map(s => '<option value="' + esc(s) + '"' + (s === current ? ' selected' : '') + '>' + esc(s) + '</option>').join('');
}

function getFilteredDiffs() {
  return allDiffs.filter(d => {
    if (d.isIgnored && currentFilter !== 'ignored') return false;
    if (currentSupplier && d.supplier !== currentSupplier) return false;
    if (currentFilter === 'all' || currentFilter === 'ignored') return true;
    if (currentFilter === 'price') return d.issues && d.issues.some(i => i.type === 'price');
    if (currentFilter === 'discontinued') return d.issues && d.issues.some(i => i.type === 'discontinued');
    if (currentFilter === 'unregistered') return d.type === 'unregistered';
    return true;
  });
}

// ===================== 差異リスト描画 =====================
function renderDiffs() {
  buildSupplierFilter();
  const filtered = getFilteredDiffs();
  const container = document.getElementById('diffList');

  if (filtered.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:32px;color:#9ca3af;">差異はありません ✅</div>';
    return;
  }

  container.innerHTML = filtered.map(d => renderDiffItem(d)).join('');
  updateBulkBtn();
}

function bcartLinks(d) {
  if (!d.bcartProductId || !d.bcartSetId) return '';
  const productUrl = BCART_ADMIN_BASE + '/' + d.bcartProductId + '/edit';
  const setUrl = BCART_ADMIN_BASE + '/' + d.bcartProductId + '/set/' + d.bcartSetId + '/edit';
  return '<div class="bcart-ids">' +
    '🔗 商品ID: <a href="' + productUrl + '" target="_blank">' + d.bcartProductId + '</a>' +
    '&nbsp;／&nbsp;セットID: <a href="' + setUrl + '" target="_blank">' + d.bcartSetId + '</a>' +
    '</div>';
}

function renderDiffItem(d) {
  const isIgnored = d.isIgnored;
  const isWip = d.isWip;
  let badges = '';
  let details = '';
  let actionBtns = '';
  let checkboxes = '';

  if (d.type === 'unregistered') {
    badges += '<span class="badge badge-unreg">❌ 未登録</span>';
    details = '<div class="diff-detail"><div class="row"><span class="lbl">売上単価</span><span>' + d.csvPrice.toLocaleString() + '円</span></div></div>';
    if (!isIgnored) {
      actionBtns += '<button class="btn btn-gray btn-sm" onclick="markWip(\'' + esc(d.code) + '\',\'' + esc(d.name) + '\')">' + (isWip ? '✏️ 作業中' : '📝 作業中にする') + '</button>';
    }
  } else if (d.issues) {
    d.issues.forEach(issue => {
      if (issue.type === 'price') {
        badges += '<span class="badge badge-price">💰 価格差異</span>';
        details += '<div class="diff-detail"><div class="row"><span class="lbl">売上単価</span><span class="old">' + issue.bcartPrice.toLocaleString() + '円</span> → <span class="new">' + issue.csvPrice.toLocaleString() + '円</span></div></div>';
        if (!isIgnored) {
          checkboxes += '<input type="checkbox" class="diff-check"' +
            ' data-code="' + esc(d.code) + '"' +
            ' data-type="price"' +
            ' data-set-id="' + d.bcartSetId + '"' +
            ' data-price="' + issue.csvPrice + '"' +
            ' data-before-price="' + issue.bcartPrice + '"' +
            ' data-name="' + esc(d.name) + '"' +
            ' data-csv-kouri="' + (d.csvKouri || 0) + '"' +
            ' data-csv-shiire="' + (d.csvShiire || 0) + '"' +
            ' onchange="updateBulkBtn()">';
          actionBtns += '<button class="btn btn-success btn-sm"' +
            ' data-set-id="' + d.bcartSetId + '"' +
            ' data-code="' + esc(d.code) + '"' +
            ' data-name="' + esc(d.name) + '"' +
            ' data-price="' + issue.csvPrice + '"' +
            ' data-before-price="' + issue.bcartPrice + '"' +
            ' data-csv-kouri="' + (d.csvKouri || 0) + '"' +
            ' data-csv-shiire="' + (d.csvShiire || 0) + '"' +
            ' onclick="updatePriceBtn(this)">💰 価格更新</button>';
        }
      }
      if (issue.type === 'discontinued') {
        badges += '<span class="badge badge-disc">🚫 廃番</span>';
        details += '<div class="diff-detail"><div class="row"><span class="lbl">状態</span><span>BCARTセットを非表示にする必要があります</span></div></div>';
        if (!isIgnored) {
          checkboxes += '<input type="checkbox" class="diff-check"' +
            ' data-code="' + esc(d.code) + '"' +
            ' data-type="discontinued"' +
            ' data-set-id="' + d.bcartSetId + '"' +
            ' data-name="' + esc(d.name) + '"' +
            ' onchange="updateBulkBtn()">';
          actionBtns += '<button class="btn btn-danger btn-sm"' +
            ' data-set-id="' + d.bcartSetId + '"' +
            ' data-code="' + esc(d.code) + '"' +
            ' data-name="' + esc(d.name) + '"' +
            ' onclick="hideProductSetBtn(this)">🚫 非表示にする</button>';
        }
      }
      if (issue.type === 'jodai') {
        badges += '<span class="badge badge-price">💴 上代差異</span>';
        details += '<div class="diff-detail"><div class="row"><span class="lbl">上代</span><span class="old">' + issue.bcartJodai.toLocaleString() + '円</span> → <span class="new">' + issue.csvJodai.toLocaleString() + '円</span></div></div>';
      }
      if (issue.type === 'jan') {
        badges += '<span class="badge badge-price">🔖 JAN差異</span>';
        details += '<div class="diff-detail"><div class="row"><span class="lbl">JAN</span><span class="old">' + esc(issue.bcartJan) + '</span> → <span class="new">' + esc(issue.csvJan) + '</span></div></div>';
      }
    });
  }

  if (isIgnored) badges += '<span class="badge badge-ignore">対応不要</span>';
  if (isWip) badges += '<span class="badge badge-wip">作業中</span>';

  const ignoreBtn = isIgnored
    ? '<button class="btn btn-gray btn-sm" onclick="unmarkIgnore(\'' + esc(d.code) + '\')">解除</button>'
    : '<button class="btn btn-gray btn-sm" onclick="openIgnoreModal(\'' + esc(d.code) + '\',\'' + esc(d.name) + '\')">対応不要</button>';

  return '<div class="diff-item' + (isIgnored ? ' ignored' : '') + '" id="diff-' + esc(d.code) + '">' +
    '<div class="diff-header">' +
    '<span class="diff-code">' + esc(d.code) + '</span>' +
    '<span class="diff-name">' + esc(d.name) + '</span>' +
    '<span class="diff-supplier">' + esc(d.supplier || '') + '</span>' +
    badges +
    bcartLinks(d) +
    '</div>' +
    details +
    '<div class="diff-actions">' +
    checkboxes + actionBtns +
    '<div style="margin-left:auto;">' + ignoreBtn + '</div>' +
    '</div>' +
    '</div>';
}

// ===================== 一括更新（進捗表示付き） =====================
function toggleSelectAll(cb) {
  document.querySelectorAll('.diff-check').forEach(c => c.checked = cb.checked);
  updateBulkBtn();
}

function updateBulkBtn() {
  const count = document.querySelectorAll('.diff-check:checked').length;
  const btn = document.getElementById('bulkBtn');
  btn.disabled = count === 0;
  btn.textContent = count > 0 ? '✅ 選択した ' + count + ' 件を一括更新' : '✅ 選択項目を一括更新';
}

async function bulkUpdate() {
  const checked = document.querySelectorAll('.diff-check:checked');
  if (checked.length === 0) return;
  const total = checked.length;
  if (!confirm(total + '件をBCARTに反映します。よろしいですか？')) return;

  const items = [];
  checked.forEach(c => {
    if (c.dataset.type === 'price') {
      items.push({
        action: 'updatePrice',
        code: c.dataset.code,
        name: c.dataset.name || '',
        bcartSetId: c.dataset.setId,
        price: parseFloat(c.dataset.price),
        beforePrice: parseFloat(c.dataset.beforePrice || 0),
        csvKouri: parseFloat(c.dataset.csvKouri || 0),
        csvShiire: parseFloat(c.dataset.csvShiire || 0)
      });
    } else if (c.dataset.type === 'discontinued') {
      items.push({
        action: 'hideProductSet',
        code: c.dataset.code,
        name: c.dataset.name || '',
        bcartSetId: c.dataset.setId
      });
    }
  });

  showProgressOverlay(total);

  let successCount = 0;
  let failCount = 0;

  for (let i = 0; i < items.length; i++) {
    const item = items[i];
    updateProgressOverlay(i + 1, total, item.code + ' ' + item.name);
    try {
      const res = await gasPostAsync(item);
      if (res.ok) { successCount++; }
      else { failCount++; }
    } catch(e) {
      failCount++;
    }
  }

  const resultMsg = failCount > 0
    ? successCount + '件成功、' + failCount + '件失敗'
    : total + '件をすべて更新しました';
  finishProgressOverlay(resultMsg, failCount > 0);
}

// ===================== 進捗オーバーレイ =====================
function showProgressOverlay(total) {
  document.getElementById('progressCount').textContent = '0 / ' + total;
  document.getElementById('progressBarFill').style.width = '0%';
  document.getElementById('progressDetail').textContent = '準備中...';
  document.getElementById('progressResult').textContent = '';
  document.getElementById('progressOverlay').classList.add('open');
  document.getElementById('bulkBtn').disabled = true;
}

function updateProgressOverlay(current, total, label) {
  document.getElementById('progressCount').textContent = current + ' / ' + total;
  document.getElementById('progressBarFill').style.width = Math.round((current / total) * 100) + '%';
  document.getElementById('progressDetail').textContent = label || '';
}

function finishProgressOverlay(resultMsg, isError) {
  document.getElementById('progressCount').textContent = '完了';
  document.getElementById('progressBarFill').style.width = '100%';
  document.getElementById('progressDetail').textContent = '';
  document.getElementById('progressResult').innerHTML =
    '<span style="color:' + (isError ? '#dc2626' : '#059669') + ';font-weight:600;">' + esc(resultMsg) + '</span>';

  setTimeout(function() {
    document.getElementById('progressOverlay').classList.remove('open');
    document.getElementById('bulkBtn').disabled = false;
    showToast(resultMsg, isError);
    loadData();
  }, 1800);
}

// ===================== 個別更新 =====================
function updatePriceBtn(btn) {
  const code = btn.dataset.code;
  const name = btn.dataset.name;
  const bcartSetId = btn.dataset.setId;
  const price = parseFloat(btn.dataset.price);
  const beforePrice = parseFloat(btn.dataset.beforePrice || 0);
  const csvKouri = parseFloat(btn.dataset.csvKouri || 0);
  const csvShiire = parseFloat(btn.dataset.csvShiire || 0);

  if (!confirm(code + ' の価格を ' + price.toLocaleString() + '円 に更新しますか？')) return;
  gasPost({ action: 'updatePrice', bcartSetId, price, beforePrice, csvKouri, csvShiire, code, name }, function(res) {
    if (!res.ok) { showToast('エラー: ' + res.error, true); return; }
    showToast('価格を更新しました');
    removeDiff(code);
  });
}

function hideProductSetBtn(btn) {
  const code = btn.dataset.code;
  const name = btn.dataset.name;
  const bcartSetId = btn.dataset.setId;

  if (!confirm(code + ' のセットをBCARTで非表示にしますか？')) return;
  gasPost({ action: 'hideProductSet', bcartSetId, code, name }, function(res) {
    if (!res.ok) { showToast('エラー: ' + res.error, true); return; }
    showToast('セットを非表示にしました');
    removeDiff(code);
  });
}

function removeDiff(code) {
  allDiffs = allDiffs.filter(d => d.code !== code);
  updateSummary();
  renderDiffs();
}

// ===================== 対応不要 =====================
function openIgnoreModal(code, name) {
  pendingIgnoreCode = code;
  pendingIgnoreName = name;
  document.getElementById('ignoreModalCode').textContent = code;
  document.getElementById('ignoreModalName').textContent = name;
  document.getElementById('ignoreReason').value = '';
  document.getElementById('ignoreModal').classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function confirmIgnore() {
  const reason = document.getElementById('ignoreReason').value.trim();
  closeModal('ignoreModal');
  gasPost({ action: 'markIgnore', code: pendingIgnoreCode, name: pendingIgnoreName, reason: reason }, function(res) {
    if (!res.ok) { showToast('エラー: ' + res.error, true); return; }
    showToast('対応不要にしました');
    const d = allDiffs.find(x => x.code === pendingIgnoreCode);
    if (d) { d.isIgnored = true; d.ignoreReason = reason; }
    updateSummary();
    renderDiffs();
  });
}

function unmarkIgnore(code) {
  if (!confirm('対応不要を解除しますか？')) return;
  gasPost({ action: 'unmarkIgnore', code: code }, function(res) {
    if (!res.ok) { showToast('エラー: ' + res.error, true); return; }
    showToast('解除しました');
    const d = allDiffs.find(x => x.code === code);
    if (d) d.isIgnored = false;
    updateSummary();
    renderDiffs();
  });
}

function markWip(code, name) {
  gasPost({ action: 'markWip', code: code, name: name }, function(res) {
    if (!res.ok) { showToast('エラー: ' + res.error, true); return; }
    showToast('作業中にしました');
    const d = allDiffs.find(x => x.code === code);
    if (d) d.isWip = true;
    renderDiffs();
  });
}

// ===================== 対応不要一覧 =====================
function loadIgnoreList() {
  document.getElementById('ignoreList').innerHTML = '<div class="loading"><div class="spinner"></div><div>読み込み中...</div></div>';
  gasPost({ action: 'getIgnoreList' }, function(res) {
    if (!res.ok) { showToast('エラー: ' + res.error, true); return; }
    const list = res.list || [];
    if (list.length === 0) {
      document.getElementById('ignoreList').innerHTML = '<div style="text-align:center;padding:32px;color:#9ca3af;">対応不要商品はありません</div>';
      return;
    }
    document.getElementById('ignoreList').innerHTML = list.map(item => {
      const diff = allDiffs.find(d => d.code === String(item.code));
      const links = diff ? bcartLinks(diff) : '';
      return '<div class="ignore-item">' +
        '<div class="info">' +
        '<div><strong>' + esc(item.code) + '</strong> <span style="color:#6b7280;">' + esc(item.name) + '</span>' +
        (item.supplier ? '<span style="font-size:11px;color:#9ca3af;margin-left:8px;">' + esc(item.supplier) + '</span>' : '') + '</div>' +
        (item.reason ? '<div class="reason">理由: ' + esc(item.reason) + '</div>' : '') +
        '<div style="font-size:11px;color:#9ca3af;margin-top:2px;">' + esc(String(item.registeredAt)) + '</div>' +
        (links ? '<div style="margin-top:4px;">' + links + '</div>' : '') +
        '</div>' +
        '<button class="btn btn-gray btn-sm" onclick="unmarkIgnoreFromList(\'' + esc(item.code) + '\',this)">解除</button>' +
        '</div>';
    }).join('');
  });
}

function unmarkIgnoreFromList(code, btn) {
  if (!confirm('対応不要を解除しますか？')) return;
  gasPost({ action: 'unmarkIgnore', code: code }, function(res) {
    if (!res.ok) { showToast('エラー: ' + res.error, true); return; }
    showToast('解除しました');
    btn.closest('.ignore-item').remove();
    const d = allDiffs.find(x => x.code === code);
    if (d) d.isIgnored = false;
    updateSummary();
  });
}

// ===================== 欠品設定 =====================
function searchStock() {
  const query = document.getElementById('stockQuery').value.trim();
  if (!query) return;

  const found = allDiffs.filter(d =>
    d.code.includes(query) || (d.name && d.name.includes(query))
  );

  const container = document.getElementById('stockResult');
  if (found.length === 0) {
    container.innerHTML =
      '<div class="stock-result">' +
      '<div style="color:#6b7280;font-size:13px;margin-bottom:10px;">差異リストにない商品コードでも直接設定できます。</div>' +
      '<div style="display:flex;gap:8px;align-items:center;">' +
      '<strong>' + esc(query) + '</strong>' +
      '<button class="btn btn-danger btn-sm" onclick="setStock(\'' + esc(query) + '\',\'\',0,this)">🚫 欠品（在庫0）</button>' +
      '<button class="btn btn-success btn-sm" onclick="setStock(\'' + esc(query) + '\',\'\',1,this)">✅ 在庫あり（在庫1）</button>' +
      '</div></div>';
    return;
  }

  container.innerHTML = found.map(d => {
    const links = bcartLinks(d);
    return '<div class="stock-result">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">' +
      '<div><span style="font-family:monospace;font-size:12px;color:#6b7280;">' + esc(d.code) + '</span> <strong>' + esc(d.name) + '</strong>' +
      (links ? '<div style="margin-top:4px;">' + links + '</div>' : '') + '</div>' +
      '<div style="display:flex;gap:8px;">' +
      '<button class="btn btn-danger btn-sm" onclick="setStock(\'' + esc(d.code) + '\',\'' + esc(d.name) + '\',0,this)">🚫 欠品（在庫0）</button>' +
      '<button class="btn btn-success btn-sm" onclick="setStock(\'' + esc(d.code) + '\',\'' + esc(d.name) + '\',1,this)">✅ 在庫あり（在庫1）</button>' +
      '</div></div></div>';
  }).join('');
}

function setStock(productNo, name, stock, btn) {
  const label = stock === 0 ? '欠品（在庫0）' : '在庫あり（在庫1）';
  if (!confirm(productNo + ' を ' + label + ' に設定しますか？')) return;
  btn.disabled = true;
  gasPost({ action: 'setStock', productNo: productNo, name: name || '', stock: stock }, function(res) {
    btn.disabled = false;
    if (!res.ok) { showToast('エラー: ' + res.error, true); return; }
    showToast(productNo + ' を ' + label + ' に設定しました');
  });
}

// ===================== 更新履歴 =====================
function loadHistory() {
  document.getElementById('historyList').innerHTML = '<div class="loading"><div class="spinner"></div><div>読み込み中...</div></div>';
  gasPost({ action: 'getHistory' }, function(res) {
    if (!res.ok) { showToast('エラー: ' + res.error, true); return; }
    const list = res.list || [];
    if (list.length === 0) {
      document.getElementById('historyList').innerHTML = '<div style="text-align:center;padding:32px;color:#9ca3af;">履歴はありません</div>';
      return;
    }
    const rows = list.map(item => {
      const isOk = String(item.result).startsWith('成功');
      return '<tr>' +
        '<td style="white-space:nowrap;font-size:12px;">' + esc(String(item.date)) + '</td>' +
        '<td style="white-space:nowrap;">' + esc(item.userName) + '</td>' +
        '<td style="font-family:monospace;font-size:12px;">' + esc(item.code) + '</td>' +
        '<td>' + esc(item.name) + '</td>' +
        '<td style="white-space:nowrap;">' + esc(item.type) + '</td>' +
        '<td style="color:#9ca3af;font-size:12px;">' + esc(item.before) + '</td>' +
        '<td style="font-size:12px;">' + esc(item.after) + '</td>' +
        '<td class="' + (isOk ? 'result-ok' : 'result-ng') + '">' + esc(item.result) + '</td>' +
        '</tr>';
    }).join('');

    document.getElementById('historyList').innerHTML =
      '<div style="overflow-x:auto;">' +
      '<table class="history-table">' +
      '<thead><tr>' +
      '<th>日時</th><th>操作者</th><th>商品コード</th><th>商品名</th>' +
      '<th>操作種別</th><th>変更前</th><th>変更後</th><th>結果</th>' +
      '</tr></thead>' +
      '<tbody>' + rows + '</tbody>' +
      '</table></div>';
  });
}

// ===================== GAS通信 =====================
function gasPost(params, callback) {
  params.session = session;
  fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(params)
  })
  .then(r => r.json())
  .then(res => callback(res))
  .catch(err => showToast('通信エラー: ' + err.message, true));
}

function gasPostAsync(params) {
  params.session = session;
  return fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(params)
  }).then(r => r.json());
}

// ===================== ユーティリティ =====================
function showToast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = isError ? 'error' : '';
  el.style.display = 'block';
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.style.display = 'none', 3000);
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
